services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: topoaudit
      POSTGRES_USER: topoaudit
      POSTGRES_PASSWORD: topoaudit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topoaudit -d topoaudit"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: local
      APP_NAME: TopoAudit Benin
      DATABASE_URL: postgresql+psycopg://topoaudit:topoaudit@db:5432/topoaudit
      FRONTEND_URL: http://localhost:3000
      LOCAL_STORAGE_PATH: /data/uploads
      OCR_PROVIDER: gemini
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_ENDPOINT: ${GEMINI_API_ENDPOINT:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemma-4-31b-it}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_API_ENDPOINT: ${MISTRAL_API_ENDPOINT:-https://api.mistral.ai/v1}
      MISTRAL_OCR_MODEL: ${MISTRAL_OCR_MODEL:-mistral-ocr-latest}
      MISTRAL_INCLUDE_BLOCKS: ${MISTRAL_INCLUDE_BLOCKS:-true}
      MISTRAL_CONFIDENCE_GRANULARITY: ${MISTRAL_CONFIDENCE_GRANULARITY:-word}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - api_uploads:/data/uploads

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  api_uploads:
